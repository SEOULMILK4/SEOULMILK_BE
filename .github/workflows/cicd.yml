name: CI-CD

on:
  push:
    branches: [ "dev" ]
    
jobs:
  CI-CD:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        
        - name: Set up JDK 17
          uses: actions/setup-java@v3
          with:
            java-version: '17'
            distribution: 'temurin'
  
        - name: Gradle Caching
          uses: actions/cache@v3
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
            restore-keys: |
              ${{ runner.os }}-gradle-

        - name: Create application.yml
          if: contains(github.ref, 'dev')
          run: |
            cd ./src/main/resources 
            touch ./application.yml 
            echo "${{ secrets.YML }}" > ./application.yml
          shell: bash

        - name: Grant execute permission for gradlew
          run: chmod +x gradlew

        - name: Build with Gradle Wrapper (without tests)
          run: ./gradlew build -x test

        - name: Docker build and push to dev
          if: contains(github.ref, 'dev')
          run: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker build -f Dockerfile.dev -t ${{ secrets.DOCKER_REPO }}/seoulmilk-backend .
            docker push ${{ secrets.DOCKER_REPO }}/seoulmilk-backend

        - name: Deploy to dev
          if: contains(github.ref, 'dev')
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.HOST_DEV }}
            username: ubuntu
            key: ${{ secrets.SSH_KEY_DEV }}
            script: |
              cd /home/ubuntu
              sudo docker stop $(docker ps -q) || true
              sudo docker rm -f $(docker ps -qa)
              sudo docker pull ${{ secrets.DOCKER_REPO }}/seoulmilk-backend
              sudo docker image prune -f
