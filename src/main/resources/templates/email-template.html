<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>[서울우유협동조합] 이메일 인증 코드</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 20px;">

    <h2 style="color: #333;">이메일 인증 코드</h2>
    <p style="font-size: 16px;">아래 인증 코드를 입력하여 본인 인증을 진행하세요.</p>

    <div style="display: inline-block; padding: 10px 20px; font-size: 24px; font-weight: bold; background: #f8f9fa; border-radius: 8px; border: 1px solid #ddd;">
        <span th:text="${otpCode}"></span>
    </div>

    <p style="margin-top: 10px; font-size: 14px;">인증 코드는 <strong>5분</strong> 후 만료됩니다.</p>
    <p style="color: gray; font-size: 12px;">본 메일은 자동 발송되었습니다. 문의가 필요하면 고객센터로 연락해주세요.</p>

</body>
</html>
